# Runtime selection for vault agents.
#
# ── Format ──────────────────────────────────────────────────────────────
#   AGENT=runtime                     Single runtime
#   AGENT=runtime1,runtime2           Fallback chain (try first, fall back)
#   AGENT_MODE=runtime                Per-mode override
#   runtime = claude | claude:model | codex
#   model   = opus | sonnet | haiku | <full-model-id>
#
# ── How it works ────────────────────────────────────────────────────────
# Two execution paths exist for claude runtimes:
#
#   1. SDK (Anthropic Python API) — used by vault-bot.py for streaming.
#      Requires API credits (~$0.003/call for Haiku, ~$0.05 for Sonnet).
#      Reads API key from ~/.anthropic/api_key.
#      Enables progressive message edits in Telegram (text appears word-by-word).
#      Falls back to CLI if API key missing or credits exhausted.
#
#   2. CLI (claude command) — used by invoke-agent.sh for batch agents.
#      Covered by Max subscription ($100/month). No extra cost.
#      No streaming. Response arrives all at once after 10-30s.
#
# vault-bot.py tries SDK first (for streaming), falls back to CLI automatically.
# All other agents (Extractor, Mirror, etc.) use CLI via invoke-agent.sh.
#
# ── Current billing strategy (Option 3) ─────────────────────────────────
# Max subscription ($100/month) covers CLI for all agents.
# Small API credits (~$5/month) cover Haiku triage in Telegram for fast UX.
# To switch to API-only: set all ADVISOR modes to claude:<model>, drop Max to Pro.
# To switch to CLI-only: comment out ADVISOR_TRIAGE override below.
#
# ── Runtimes ────────────────────────────────────────────────────────────

# Codex extraction hangs under launchd (stdin pipe stalls on complex prompts).
# Using Claude CLI (covered by Max subscription) until Codex pipe issue is resolved.
# All agents on Claude CLI (Max subscription) until we have token tracking.
# Once we know per-agent costs, we can move cheaper tasks back to Codex.
EXTRACTOR=claude
REVIEWER=claude
IMPLEMENTER=claude
RETROSPECTIVE=claude
THINKER=claude
RESEARCHER=claude
HANDOFF=claude
TASK_ENRICHER=claude
MIRROR=claude
ADVISOR=claude
EMAIL_WORKFLOW=claude

# ── Per-mode Advisor overrides ──────────────────────────────────────────
# Triage uses Haiku via API SDK — fast (~2s first token), cheap (~$0.003/call).
# vault-bot.py reads this and routes triage through SDK streaming.
# Ask/strategy use CLI (covered by Max subscription) — deeper reasoning, no streaming.
ADVISOR_TRIAGE=claude:haiku
# ADVISOR_FEEDBACK=claude:haiku     # Uncomment if you want fast feedback too
# ADVISOR_ASK=claude:sonnet         # Uncomment to stream /ask via API
# ADVISOR_STRATEGY=claude:opus      # Uncomment to stream /strategy via API (most expensive)

# ── Fallback chains (uncomment when Codex is installed) ──────────────
# ADVISOR=codex,claude             # Codex first, Claude as backup
# TASK_ENRICHER=codex,claude
# MIRROR=codex,claude

# Set to 1 only after verifying that the configured Researcher runtime can
# actually browse the web and cite sources reliably in the real machine context.
RESEARCHER_WEB_RUNTIME_VERIFIED=1
